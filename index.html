<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ClinicaAI • Patient Health Portal</title>
  <!-- Bootstrap 5 + Font Awesome + React -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #eef2f5; font-family: 'Segoe UI', system-ui; }
    .card-hover { transition: 0.2s; }
    .risk-high { background: #ffebee; border-left: 5px solid #d32f2f; }
    .risk-mid { background: #fff8e1; border-left: 5px solid #f57c00; }
    .risk-low { background: #e8f5e9; border-left: 5px solid #2e7d32; }
    .history-timeline { max-height: 250px; overflow-y: auto; font-size: 0.85rem; }
    .shap-bar { height: 8px; border-radius: 20px; background: #1F6E8C; }
    .nav-tabs .nav-link.active { background-color: #1F6E8C; color: white; }
    .nav-tabs .nav-link { color: #1F6E8C; }
    .image-thumb { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; cursor: pointer; }
    .login-card { max-width: 450px; margin: 0 auto; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  // ----------------------------- STORAGE KEYS -----------------------------
  const STORAGE_PATIENTS = 'clinica_patients';
  const STORAGE_PATIENT_SESSION = 'clinica_patient_session';
  const STORAGE_REQUESTS = 'clinica_requests';

  // ----------------------------- HELPERS ---------------------------------
  const loadPatients = () => {
    const stored = localStorage.getItem(STORAGE_PATIENTS);
    if (stored) return JSON.parse(stored);
    // Generate 5 demo patients with credentials
    const demo = [];
    for (let i = 1; i <= 5; i++) {
      demo.push({
        id: i,
        name: `Demo Patient ${i}`,
        username: `patient${i}`,
        password: 'pass123',
        age: 30 + i,
        gender: i % 2 === 0 ? 'Female' : 'Male',
        condition: ['Hypertension', 'Diabetes', 'Asthma', 'None'][i % 4],
        attendingClinician: 'Dr. Smith (Auto-assigned)',
        systolic: 110 + i, 
        diastolic: 70 + (i % 10),
        glucose: 90 + i, 
        heartRate: 75, 
        bmi: 24,
        wearableSteps: 5000 + i * 200, 
        wearableSleep: 7,
        history: [{ date: new Date().toISOString().slice(0,10), note: 'Initial record', updatedBy: 'system' }],
        images: [], 
        scans: []
      });
    }
    localStorage.setItem(STORAGE_PATIENTS, JSON.stringify(demo));
    return demo;
  };
  const savePatients = (data) => localStorage.setItem(STORAGE_PATIENTS, JSON.stringify(data));

  const loadRequests = () => {
    const stored = localStorage.getItem(STORAGE_REQUESTS);
    return stored ? JSON.parse(stored) : [];
  };
  const saveRequests = (data) => localStorage.setItem(STORAGE_REQUESTS, JSON.stringify(data));

  const addHistoryEntry = (patientId, note, updater) => {
    const patients = loadPatients();
    const idx = patients.findIndex(p => p.id === patientId);
    if (idx !== -1) {
      patients[idx].history = patients[idx].history || [];
      patients[idx].history.push({ date: new Date().toISOString().slice(0,10), note, updatedBy: updater });
      savePatients(patients);
    }
  };

  // ML Risk Prediction
  const predictRisk = (p) => {
    let risk = (p.age > 60 ? 0.5 : p.age > 45 ? 0.3 : 0.1) +
               (p.glucose > 140 ? 0.4 : p.glucose > 110 ? 0.2 : 0) +
               (p.systolic > 140 ? 0.3 : p.systolic > 130 ? 0.15 : 0);
    risk = Math.min(0.95, risk);
    return { ensemble: risk, shap: [
      { feature: 'Age', value: p.age > 60 ? 0.7 : p.age > 45 ? 0.4 : 0.1 },
      { feature: 'Glucose', value: p.glucose > 140 ? 0.8 : p.glucose > 110 ? 0.4 : 0.1 },
      { feature: 'BP', value: p.systolic > 140 ? 0.6 : 0.2 }
    ]};
  };

  // Symptom checker
  const symptomMap = {
    'fever': 'Infection/COVID-19', 'cough': 'Respiratory infection', 'headache': 'Migraine/Hypertension',
    'fatigue': 'Anemia/Diabetes', 'chest pain': 'Cardiac issue', 'shortness of breath': 'Asthma/COPD'
  };
  const predictDisease = (symptoms, patient) => {
    if (!symptoms.length) return null;
    let found = null;
    for (let s of symptoms) {
      if (symptomMap[s]) { found = symptomMap[s]; break; }
    }
    return found || 'Consult clinician';
  };

  // ----------------------------- LOGIN SCREEN (Patient only + Registration) -----------------------------
  const LoginScreen = ({ onLogin }) => {
    const [mode, setMode] = React.useState('login'); // 'login' or 'register'
    const [username, setUsername] = React.useState('');
    const [password, setPassword] = React.useState('');
    const [error, setError] = React.useState('');
    // Registration fields
    const [fullName, setFullName] = React.useState('');
    const [age, setAge] = React.useState('');
    const [gender, setGender] = React.useState('Male');
    const [condition, setCondition] = React.useState('None');

    const handleSubmit = (e) => {
      e.preventDefault();
      setError('');
      if (mode === 'register') {
        const patients = loadPatients();
        if (patients.find(p => p.username === username)) {
          setError('Username already taken');
          return;
        }
        // Assign to a default clinician (system)
        const newPatient = {
          id: Date.now(),
          name: fullName,
          username,
          password,
          age: parseInt(age),
          gender,
          condition: condition || 'None',
          attendingClinician: 'Dr. Smith (Auto-assigned)',
          systolic: 120, 
          diastolic: 80,
          glucose: 100, 
          heartRate: 75, 
          bmi: 24,
          wearableSteps: 5000, 
          wearableSleep: 7,
          history: [{ date: new Date().toISOString().slice(0,10), note: 'Patient self-registered', updatedBy: 'self' }],
          images: [], 
          scans: []
        };
        patients.push(newPatient);
        savePatients(patients);
        alert('Registration successful! Please login with your credentials.');
        setMode('login');
        setUsername('');
        setPassword('');
        setFullName('');
        setAge('');
        setGender('Male');
        setCondition('');
      } else { // patient login
        const patients = loadPatients();
        const patient = patients.find(p => p.username === username && p.password === password);
        if (patient) {
          localStorage.setItem(STORAGE_PATIENT_SESSION, JSON.stringify({ id: patient.id, name: patient.name }));
          onLogin(patient);
        } else setError('Invalid username or password. Try patient1/patient2 with pass123');
      }
    };

    return (
      <div className="container d-flex justify-content-center align-items-center min-vh-100">
        <div className="card shadow p-4 login-card">
          <h3 className="text-center mb-3"><i className="fas fa-hospital-user"></i> ClinicaAI • Patient Portal</h3>
          <div className="text-center mb-3">
            <i className="fas fa-user-injured fa-2x text-primary"></i>
            <p className="mt-2 text-muted">Secure access to your health records</p>
          </div>
          <div className="text-center mb-2">
            <button className="btn btn-sm btn-link" onClick={() => { setMode(mode === 'login' ? 'register' : 'login'); setError(''); }}>
              {mode === 'login' ? 'Create new patient account' : 'Back to login'}
            </button>
          </div>
          <form onSubmit={handleSubmit}>
            {mode === 'register' && (
              <>
                <input type="text" className="form-control mb-2" placeholder="Full Name" value={fullName} onChange={e=>setFullName(e.target.value)} required />
                <input type="number" className="form-control mb-2" placeholder="Age" value={age} onChange={e=>setAge(e.target.value)} required />
                <select className="form-select mb-2" value={gender} onChange={e=>setGender(e.target.value)}>
                  <option>Male</option><option>Female</option><option>Other</option>
                </select>
                <input type="text" className="form-control mb-2" placeholder="Primary condition (optional)" value={condition} onChange={e=>setCondition(e.target.value)} />
              </>
            )}
            <input type="text" className="form-control mb-2" placeholder="Username" value={username} onChange={e=>setUsername(e.target.value)} required />
            <input type="password" className="form-control mb-2" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} required />
            {error && <div className="alert alert-danger py-1 small">{error}</div>}
            <button type="submit" className="btn btn-primary w-100">{mode === 'login' ? 'Login' : 'Register'}</button>
          </form>
          {mode === 'login' && (
            <div className="text-center mt-3 small text-muted">
              <i className="fas fa-info-circle"></i> Demo: patient1 / pass123 &nbsp;|&nbsp; patient2 / pass123
            </div>
          )}
        </div>
      </div>
    );
  };

  // ----------------------------- PATIENT PORTAL (Enhanced) -----------------------------
  const PatientPortal = ({ patient, onLogout }) => {
    const [currentPatient, setCurrentPatient] = React.useState(patient);
    const [symptoms, setSymptoms] = React.useState('');
    const [prediction, setPrediction] = React.useState(null);
    const [requestMsg, setRequestMsg] = React.useState('');
    const [requestStatus, setRequestStatus] = React.useState('');
    const [reply, setReply] = React.useState(null);
    const [activeInfoTab, setActiveInfoTab] = React.useState('summary'); // summary, history, images

    const refresh = () => {
      const all = loadPatients();
      const updated = all.find(p => p.id === currentPatient.id);
      if (updated) setCurrentPatient(updated);
      const reqs = loadRequests().filter(r => r.patientId === currentPatient.id && r.status === 'answered');
      if (reqs.length) setReply(reqs[reqs.length-1]);
    };
    React.useEffect(() => { 
      refresh(); 
      const interval = setInterval(refresh, 5000); 
      return () => clearInterval(interval); 
    }, []);

    const risk = predictRisk(currentPatient);
    const riskClass = risk.ensemble > 0.6 ? 'risk-high' : (risk.ensemble > 0.3 ? 'risk-mid' : 'risk-low');
    
    const handleSymptomCheck = () => {
      const symList = symptoms.split(',').map(s => s.trim().toLowerCase()).filter(s => s);
      setPrediction(predictDisease(symList, currentPatient));
    };
    
    const sendRequest = () => {
      if (!requestMsg.trim()) {
        alert("Please describe your concern.");
        return;
      }
      const reqs = loadRequests();
      reqs.push({ 
        id: Date.now(), 
        patientId: currentPatient.id, 
        patientName: currentPatient.name, 
        clinicianUsername: currentPatient.attendingClinician, 
        message: requestMsg, 
        status: 'pending', 
        createdAt: new Date().toISOString() 
      });
      saveRequests(reqs);
      setRequestStatus('✅ Request sent! Your clinician will reply within a day.');
      setRequestMsg('');
      setTimeout(() => setRequestStatus(''), 5000);
    };

    const uploadFile = (fileInput, type) => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const all = loadPatients();
        const idx = all.findIndex(p => p.id === currentPatient.id);
        if (idx !== -1) {
          const asset = { 
            id: Date.now(), 
            name: file.name, 
            data: e.target.result, 
            type, 
            uploadedBy: currentPatient.name, 
            date: new Date().toISOString() 
          };
          if (type === 'xray') all[idx].images = [...(all[idx].images || []), asset];
          else all[idx].scans = [...(all[idx].scans || []), asset];
          savePatients(all);
          refresh();
          alert(`${type === 'xray' ? 'X-ray' : 'Scan'} uploaded successfully!`);
        }
        fileInput.value = ''; // reset input
      };
      reader.readAsDataURL(file);
    };

    return (
      <div className="container-fluid px-3 py-3">
        {/* Header with gradient */}
        <div className="d-flex justify-content-between align-items-center bg-white rounded-3 shadow-sm p-3 mb-4">
          <div>
            <h3 className="mb-0"><i className="fas fa-heartbeat text-primary me-2"></i>ClinicaAI Patient Hub</h3>
            <p className="text-muted mb-0">Welcome, {currentPatient.name}</p>
          </div>
          <button className="btn btn-outline-danger" onClick={onLogout}>
            <i className="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>

        {/* Risk banner */}
        <div className={`alert ${riskClass === 'risk-high' ? 'alert-danger' : riskClass === 'risk-mid' ? 'alert-warning' : 'alert-success'} mb-4 d-flex align-items-center`}>
          <i className={`fas fa-chart-line me-2 fa-lg ${riskClass === 'risk-high' ? 'text-danger' : riskClass === 'risk-mid' ? 'text-warning' : 'text-success'}`}></i>
          <div>
            <strong>Health Risk Assessment:</strong> Your readmission risk is <strong>{(risk.ensemble*100).toFixed(1)}%</strong>. 
            {risk.ensemble > 0.6 ? ' Please consult your clinician for preventive care.' : risk.ensemble > 0.3 ? ' Moderate risk — maintain healthy habits.' : ' Low risk — great job staying healthy!'}
          </div>
        </div>

        <div className="row">
          {/* Left column: Key metrics + symptom checker + ask clinician */}
          <div className="col-md-5 mb-4">
            <div className="card mb-3 shadow-sm">
              <div className="card-header bg-white fw-bold"><i className="fas fa-chart-simple"></i> Vitals & Wearables</div>
              <div className="card-body">
                <div className="row">
                  <div className="col-6">
                    <p><i className="fas fa-tachometer-alt"></i> <strong>BP:</strong> {currentPatient.systolic}/{currentPatient.diastolic || '??'}</p>
                    <p><i className="fas fa-tint"></i> <strong>Glucose:</strong> {currentPatient.glucose} mg/dL</p>
                    <p><i className="fas fa-heart"></i> <strong>Heart Rate:</strong> {currentPatient.heartRate} bpm</p>
                  </div>
                  <div className="col-6">
                    <p><i className="fas fa-weight-scale"></i> <strong>BMI:</strong> {currentPatient.bmi}</p>
                    <p><i className="fas fa-shoe-prints"></i> <strong>Steps:</strong> {currentPatient.wearableSteps?.toLocaleString()}</p>
                    <p><i className="fas fa-bed"></i> <strong>Sleep:</strong> {currentPatient.wearableSleep} hrs</p>
                  </div>
                </div>
                <hr />
                <div className="small text-muted">Assigned Clinician: <strong>{currentPatient.attendingClinician}</strong></div>
              </div>
            </div>

            <div className="card mb-3 shadow-sm">
              <div className="card-header bg-white fw-bold"><i className="fas fa-stethoscope"></i> AI Symptom Checker</div>
              <div className="card-body">
                <label className="form-label">Enter symptoms (comma separated):</label>
                <input type="text" className="form-control mb-2" placeholder="e.g., fever, cough, headache, fatigue" value={symptoms} onChange={e=>setSymptoms(e.target.value)} />
                <button className="btn btn-primary w-100" onClick={handleSymptomCheck}>
                  <i className="fas fa-microscope"></i> Predict Possible Condition
                </button>
                {prediction && (
                  <div className="alert alert-info mt-3 mb-0">
                    <i className="fas fa-robot"></i> <strong>AI Suggestion:</strong> {prediction}
                  </div>
                )}
              </div>
            </div>

            <div className="card shadow-sm">
              <div className="card-header bg-white fw-bold"><i className="fas fa-comment-medical"></i> Message Your Clinician</div>
              <div className="card-body">
                <textarea className="form-control mb-2" rows="3" placeholder="Describe your symptoms, medication questions, or concerns..." value={requestMsg} onChange={e=>setRequestMsg(e.target.value)}></textarea>
                <button className="btn btn-success w-100" onClick={sendRequest}>
                  <i className="fas fa-paper-plane"></i> Send Request
                </button>
                {requestStatus && <div className="alert alert-success mt-3 mb-0 small">{requestStatus}</div>}
                {reply && (
                  <div className="alert alert-secondary mt-3">
                    <i className="fas fa-reply-all"></i> <strong>Clinician's Reply:</strong><br/>
                    <span className="small">{reply.reply}</span><br/>
                    <small className="text-muted">{new Date(reply.repliedAt).toLocaleString()}</small>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Right column: Tabs for Summary, History, Images */}
          <div className="col-md-7 mb-4">
            <div className="card shadow-sm">
              <div className="card-header bg-white">
                <ul className="nav nav-tabs card-header-tabs">
                  <li className="nav-item">
                    <button className={`nav-link ${activeInfoTab === 'summary' ? 'active' : ''}`} onClick={() => setActiveInfoTab('summary')}>
                      <i className="fas fa-user-md"></i> Health Summary
                    </button>
                  </li>
                  <li className="nav-item">
                    <button className={`nav-link ${activeInfoTab === 'history' ? 'active' : ''}`} onClick={() => setActiveInfoTab('history')}>
                      <i className="fas fa-history"></i> Medical History
                    </button>
                  </li>
                  <li className="nav-item">
                    <button className={`nav-link ${activeInfoTab === 'images' ? 'active' : ''}`} onClick={() => setActiveInfoTab('images')}>
                      <i className="fas fa-x-ray"></i> Images & Scans
                    </button>
                  </li>
                </ul>
              </div>
              <div className="card-body">
                {activeInfoTab === 'summary' && (
                  <div>
                    <h5><i className="fas fa-id-card"></i> Personal Information</h5>
                    <p><strong>Name:</strong> {currentPatient.name}<br/>
                    <strong>Age / Gender:</strong> {currentPatient.age} yrs, {currentPatient.gender}<br/>
                    <strong>Primary Condition:</strong> {currentPatient.condition || 'None documented'}<br/>
                    <strong>Latest Visit:</strong> {(currentPatient.history && currentPatient.history.length) ? currentPatient.history[currentPatient.history.length-1].date : 'N/A'}</p>
                    <div className="mt-3">
                      <h6><i className="fas fa-chart-line"></i> Risk Factors (SHAP Analysis)</h6>
                      {predictRisk(currentPatient).shap.map(f => (
                        <div key={f.feature} className="mb-2">
                          <div className="d-flex justify-content-between"><span>{f.feature}</span><span>{(f.value*100).toFixed(0)}%</span></div>
                          <div className="shap-bar" style={{width: `${f.value*100}%`}}></div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                
                {activeInfoTab === 'history' && (
                  <div>
                    <h6><i className="fas fa-notes-medical"></i> Clinical Timeline</h6>
                    <div className="history-timeline">
                      {(currentPatient.history || []).slice().reverse().map((h,i) => (
                        <div key={i} className="border-bottom pb-2 mb-2">
                          <div className="d-flex justify-content-between">
                            <strong><i className="far fa-calendar-alt"></i> {h.date}</strong>
                            <span className="badge bg-secondary">by {h.updatedBy}</span>
                          </div>
                          <p className="mb-0 mt-1">{h.note}</p>
                        </div>
                      ))}
                      {(!currentPatient.history || currentPatient.history.length === 0) && <p className="text-muted">No history entries yet.</p>}
                    </div>
                  </div>
                )}
                
                {activeInfoTab === 'images' && (
                  <div>
                    <div className="mb-4">
                      <h6><i className="fas fa-x-ray"></i> Upload Medical Image</h6>
                      <div className="row g-2">
                        <div className="col-md-6">
                          <label className="form-label small">Upload X-ray</label>
                          <input type="file" className="form-control form-control-sm" accept="image/*" id="xrayUpload" />
                          <button className="btn btn-sm btn-outline-primary mt-1" onClick={() => uploadFile(document.getElementById('xrayUpload'), 'xray')}>Upload X-ray</button>
                        </div>
                        <div className="col-md-6">
                          <label className="form-label small">Upload CT/MRI Scan</label>
                          <input type="file" className="form-control form-control-sm" accept="image/*" id="scanUpload" />
                          <button className="btn btn-sm btn-outline-primary mt-1" onClick={() => uploadFile(document.getElementById('scanUpload'), 'scan')}>Upload Scan</button>
                        </div>
                      </div>
                    </div>
                    <hr />
                    <h6><i className="fas fa-images"></i> Your Medical Images</h6>
                    <div className="row">
                      {currentPatient.images?.map(img => (
                        <div className="col-4 mb-3" key={img.id}>
                          <img src={img.data} className="image-thumb w-100" style={{height: '100px', objectFit: 'cover'}} />
                          <div className="small text-truncate">{img.name}</div>
                          <span className="badge bg-info">X-ray</span>
                        </div>
                      ))}
                      {currentPatient.scans?.map(scan => (
                        <div className="col-4 mb-3" key={scan.id}>
                          <img src={scan.data} className="image-thumb w-100" style={{height: '100px', objectFit: 'cover'}} />
                          <div className="small text-truncate">{scan.name}</div>
                          <span className="badge bg-secondary">Scan</span>
                        </div>
                      ))}
                      {(!currentPatient.images || currentPatient.images.length === 0) && (!currentPatient.scans || currentPatient.scans.length === 0) && (
                        <p className="text-muted">No images or scans uploaded yet. Use the upload feature above.</p>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
        
        {/* Footer note */}
        <div className="text-center mt-3 small text-muted">
          <i className="fas fa-shield-alt"></i> Secure patient portal • Your data is private and encrypted.
        </div>
      </div>
    );
  };

  // ----------------------------- INTEROP & XAI (Removed from UI since clinician is gone, but keeping patient portal only) -----------------------------
  // The main app now only handles patient flow
  const App = () => {
    const [patient, setPatient] = React.useState(null);

    React.useEffect(() => {
      const pSess = localStorage.getItem(STORAGE_PATIENT_SESSION);
      if (pSess) {
        const pData = JSON.parse(pSess);
        const full = loadPatients().find(p => p.id === pData.id);
        if (full) setPatient(full);
      }
    }, []);

    if (patient) {
      return <PatientPortal patient={patient} onLogout={() => { localStorage.removeItem(STORAGE_PATIENT_SESSION); setPatient(null); }} />;
    }
    return <LoginScreen onLogin={(user) => setPatient(user)} />;
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
